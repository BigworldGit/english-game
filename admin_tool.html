<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Game - 资源审核 (基于源代码)</title>
    <style>
        @font-face {
            font-family: 'Zpix';
            src: url('./assets/fonts/zpix.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --bg-color: #1e1e2e;
            --card-bg: #2a2a3c;
            --accent: #00d9ff;
            --text: #e0e0e0;
            --success: #2ed573;
            --danger: #ff4757;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Zpix', monospace;
            background-color: var(--bg-color);
            color: var(--text);
            padding-bottom: 80px;
        }

        .header {
            background: rgba(30, 30, 46, 0.95);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 20px; color: var(--accent); }
        .header .meta { font-size: 12px; color: #888; margin-top: 4px; }

        .controls {
            padding: 20px 30px;
            background: var(--card-bg);
            margin: 20px 30px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        select, input {
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: 14px;
        }
        .stat strong { color: var(--accent); font-size: 16px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 0 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .card.active {
            border-color: var(--accent);
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .card.accepted { border-color: var(--success); }
        .card.rejected { border-color: var(--danger); }

        .img-box {
            height: 160px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .img-missing {
            color: #666;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info { padding: 12px; }
        
        .word { 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        
        .meaning { font-size: 13px; color: #aaa; margin-bottom: 8px; }
        
        .tags { display: flex; gap: 5px; margin-bottom: 8px; }
        .tag { 
            font-size: 10px; 
            padding: 2px 6px; 
            border-radius: 4px; 
            background: #333;
            color: #ccc;
        }
        .tag.grade { background: rgba(0, 217, 255, 0.15); color: var(--accent); }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            background: #333;
            color: #888;
        }

        .btn.accept:hover, .card.accepted .btn.accept { background: var(--success); color: #000; }
        .btn.reject:hover, .card.rejected .btn.reject { background: var(--danger); color: #fff; }

        .reason-box {
            display: none;
            margin-top: 10px;
            background: #222;
            padding: 8px;
            border-radius: 6px;
        }
        .card.rejected .reason-box { display: block; }
        
        .reason-opt {
            display: block;
            font-size: 11px;
            padding: 4px;
            cursor: pointer;
            color: #aaa;
        }
        .reason-opt:hover { color: #fff; }
        .reason-opt.selected { color: var(--danger); font-weight: bold; }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 35, 0.95);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #333;
            backdrop-filter: blur(5px);
        }

        .export-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .export-btn:disabled { background: #444; color: #666; cursor: not-allowed; }

        /* Login Overlay */
        #login {
            position: fixed; inset: 0; z-index: 999;
            background: #1e1e2e;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: #2a2a3c; padding: 40px; border-radius: 16px; width: 320px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="login">
        <div class="login-box">
            <h2 style="color:var(--accent); margin-bottom:20px;">🔒 资源审核登录</h2>
            <input type="password" id="pwd" placeholder="输入密码 (Angele921)" style="width:100%; margin-bottom:15px;">
            <button onclick="checkLogin()" class="export-btn" style="width:100%">进入</button>
            <p id="login-msg" style="color:var(--danger); font-size:12px; margin-top:10px; display:none;">密码错误</p>
        </div>
    </div>

    <div id="app" style="display:none">
        <div class="header">
            <div>
                <h1>English Game 资源审核后台</h1>
                <div class="meta">基于项目源代码 (words.js) • 数据版本: 2026.02.27</div>
            </div>
            <div style="font-size:12px; color:#666">
                快捷键: <kbd>←</kbd><kbd>→</kbd> 导航 / <kbd>Enter</kbd> 通过 / <kbd>X</kbd> 拒绝
            </div>
        </div>

        <div class="controls">
            <select id="grade-filter" onchange="render()">
                <option value="all">所有年级 (1-6)</option>
                <option value="1">Grade 1</option>
                <option value="2">Grade 2</option>
                <option value="3">Grade 3</option>
                <option value="4">Grade 4</option>
                <option value="5">Grade 5</option>
                <option value="6">Grade 6</option>
            </select>
            
            <select id="status-filter" onchange="render()">
                <option value="pending">待审核</option>
                <option value="accepted">已通过</option>
                <option value="rejected">已拒绝</option>
                <option value="all">全部显示</option>
            </select>

            <input type="text" id="search" placeholder="搜索单词..." oninput="render()">

            <div class="stats-bar">
                <div class="stat">总数: <strong id="total-count">0</strong></div>
                <div class="stat">已审: <strong id="reviewed-count">0</strong></div>
                <div class="stat">拒绝: <strong id="rejected-count" style="color:var(--danger)">0</strong></div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="footer">
            <div style="font-size:12px; color:#666">
                图片源: raw.githubusercontent.com/BigworldGit/english-game/main/images
            </div>
            <button class="export-btn" id="export-btn" onclick="generateReport()">生成重绘报告</button>
        </div>
    </div>

<script src="words.js"></script>
<script>
// ==========================================
// 1. 数据源 (来自 words.js)
// ==========================================
// 现在的 WORD_DATA 直接通过 <script src="words.js"> 加载
// ==========================================

const RAW_BASE = 'images'; // 改为本地相对路径
let items = [];
let activeIndex = -1;

function init() {
    if (typeof WORD_DATA === 'undefined') {
        alert('错误：未能加载 words.js。请确保 admin_tool.html 和 words.js 在同一目录下。');
        return;
    }

    // 展平数据：将 "1-1", "1-2" 映射到 "grade1"
    for (const [key, words] of Object.entries(WORD_DATA)) {

        const gradeNum = key.split('-')[0];
        const gradeDir = `grade${gradeNum}`;
        
        words.forEach(w => {
            // 处理特殊文件名：空格转下划线等 (根据实际 GitHub 文件名规则，通常是直接用单词)
            // 这里假设文件名就是 word.png
            const fileName = w.word.replace(/ /g, '_') + '.png'; 
            
            items.push({
                id: Math.random().toString(36).substr(2, 9),
                grade: gradeNum,
                semester: key,
                dir: gradeDir,
                word: w.word,
                meaning: w.meaning,
                category: w.category,
                url: `${RAW_BASE}/${gradeDir}/${fileName}`,
                status: 'pending', // pending, accepted, rejected
                reason: ''
            });
        });
    }
    
    document.getElementById('total-count').innerText = items.length;
}

function checkLogin() {
    const p = document.getElementById('pwd').value;
    if (p === 'Angele921') {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        init();
        render();
    } else {
        document.getElementById('login-msg').style.display = 'block';
    }
}

function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    const gradeFilter = document.getElementById('grade-filter').value;
    const statusFilter = document.getElementById('status-filter').value;
    const search = document.getElementById('search').value.toLowerCase();
    
    const filtered = items.filter(item => {
        if (gradeFilter !== 'all' && item.grade !== gradeFilter) return false;
        if (statusFilter !== 'all' && statusFilter !== item.status) return false;
        if (search && !item.word.toLowerCase().includes(search) && !item.meaning.includes(search)) return false;
        return true;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '<div style="color:#666; padding:20px; grid-column:1/-1; text-align:center">没有找到匹配的资源</div>';
        return;
    }

    // 性能优化：仅渲染前 50 个
    filtered.slice(0, 50).forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = `card ${item.status}`;
        el.dataset.id = item.id;
        if (idx === activeIndex) el.classList.add('active');
        
        el.onclick = () => activate(idx);
        
        el.innerHTML = `
            <div class="img-box">
                <img src="${item.url}" loading="lazy" 
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="img-missing" style="display:none">
                    <span>⚠️</span>
                    <span>No Image</span>
                </div>
            </div>
            <div class="info">
                <div class="word">
                    ${item.word}
                    <span style="font-size:12px; font-weight:normal; color:#666">${item.semester}</span>
                </div>
                <div class="meaning">${item.meaning}</div>
                <div class="tags">
                    <span class="tag grade">${item.dir}</span>
                    <span class="tag">${item.category}</span>
                </div>
                <div class="actions">
                    <button class="btn accept" onclick="event.stopPropagation(); setStatus('${item.id}', 'accepted')">✓ 通过</button>
                    <button class="btn reject" onclick="event.stopPropagation(); setStatus('${item.id}', 'rejected')">✗ 拒绝</button>
                </div>
                <div class="reason-box">
                    <div class="reason-opt" onclick="event.stopPropagation(); setReason('${item.id}', '质量差/模糊')">1. 质量差/模糊</div>
                    <div class="reason-opt" onclick="event.stopPropagation(); setReason('${item.id}', '内容不符')">2. 内容不符</div>
                    <div class="reason-opt" onclick="event.stopPropagation(); setReason('${item.id}', '含有文字')">3. 含有文字</div>
                    <div class="reason-opt" onclick="event.stopPropagation(); setReason('${item.id}', '风格不统一')">4. 风格不统一</div>
                </div>
            </div>
        `;
        grid.appendChild(el);
    });
}

function activate(idx) {
    const cards = document.querySelectorAll('.card');
    cards.forEach(c => c.classList.remove('active'));
    if (cards[idx]) {
        cards[idx].classList.add('active');
        activeIndex = idx;
        cards[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

function setStatus(id, status) {
    const item = items.find(i => i.id === id);
    if (item) {
        item.status = status;
        if (status === 'accepted') item.reason = ''; // 清除拒绝原因
        
        // 更新 UI
        const card = document.querySelector(`.card[data-id="${id}"]`);
        if (card) {
            card.className = `card ${status} active`;
        }
        updateStats();
        
        // 自动跳到下一个
        const currentIdx = Array.from(document.querySelectorAll('.card')).findIndex(c => c.dataset.id === id);
        if (currentIdx !== -1) {
            setTimeout(() => activate(currentIdx + 1), 100);
        }
    }
}

function setReason(id, reason) {
    const item = items.find(i => i.id === id);
    if (item) {
        item.reason = reason;
        item.status = 'rejected';
        
        // UI 更新选中状态
        const card = document.querySelector(`.card[data-id="${id}"]`);
        const opts = card.querySelectorAll('.reason-opt');
        opts.forEach(opt => {
            if (opt.textContent.includes(reason)) opt.classList.add('selected');
            else opt.classList.remove('selected');
        });
        
        updateStats();
        setTimeout(() => activate(activeIndex + 1), 200);
    }
}

function updateStats() {
    const accepted = items.filter(i => i.status === 'accepted').length;
    const rejected = items.filter(i => i.status === 'rejected').length;
    document.getElementById('reviewed-count').innerText = accepted + rejected;
    document.getElementById('rejected-count').innerText = rejected;
}

function generateReport() {
    const rejected = items.filter(i => i.status === 'rejected');
    if (rejected.length === 0) {
        alert("没有被拒绝的图片，无需生成报告。");
        return;
    }

    let report = `# 🎨 English Game 图片重绘需求\n\n`;
    report += `> 生成时间: ${new Date().toLocaleString()}\n`;
    report += `> 待重绘数量: ${rejected.length}\n\n`;
    report += `| 单词 (Word) | 目录 (Dir) | 拒绝原因 (Reason) |\n`;
    report += `|---|---|---|\n`;
    
    rejected.forEach(item => {
        report += `| **${item.word}** | \`${item.dir}\` | ${item.reason || '未说明'} |\n`;
    });

    console.log(report);
    navigator.clipboard.writeText(report).then(() => {
        alert(`报告已复制到剪贴板！\n共 ${rejected.length} 张图片需要处理。`);
    });
}

// 键盘事件
document.addEventListener('keydown', (e) => {
    if (document.getElementById('app').style.display === 'none') return;
    
    const visibleCards = document.querySelectorAll('.card');
    if (visibleCards.length === 0) return;

    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        activate(Math.min(activeIndex + 1, visibleCards.length - 1));
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        activate(Math.max(activeIndex - 1, 0));
    } else if (e.key === 'Enter') {
        if (activeIndex >= 0) {
            const id = visibleCards[activeIndex].dataset.id;
            setStatus(id, 'accepted');
        }
    } else if (e.key === 'x' || e.key === 'X') {
        if (activeIndex >= 0) {
            const id = visibleCards[activeIndex].dataset.id;
            setStatus(id, 'rejected');
        }
    }
});

// 初始化
init();
</script>
</body>
</html>
