preamble: |
  Deploy Minecraft English Learning Game with Express API and persistent storage

services:
  - type: web
    name: english-game
    runtime: node
    buildCommand: npm install --prefix server
    startCommand: node server/server.js
    healthCheckPath: /healthz
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: DATA_DIR
        value: /var/data/english-game
