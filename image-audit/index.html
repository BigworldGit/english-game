<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>English-Game 图片审核</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:15px}
.container{max-width:1200px;margin:0 auto}
h1{color:white;text-align:center;margin-bottom:10px}
.toolbar{background:white;padding:12px;border-radius:10px;margin-bottom:15px;display:flex;justify-content:space-between}
.stats{display:flex;gap:8px}
.stat{padding:6px 12px;background:#f5f5f5;border-radius:6px}
.stat b{font-size:16px;display:block}
.stat.ok b{color:#4caf50}
.stat.bad b{color:#f44336}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;background:#667eea;color:white}
.grade{margin-bottom:20px}
.grade h2{background:white;padding:10px;border-radius:10px 10px 0 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;background:white;padding:12px;border-radius:0 0 10px 10px}
.card{background:#f9f9f9;padding:8px;border-radius:8px;text-align:center;border:2px solid transparent;cursor:pointer}
.card:hover{border-color:#667eea}
.card.bad{border-color:#f44336;background:#ffe0e0}
.card.ok{border-color:#4caf50;background:#e0ffe0}
.card img{width:100%;height:80px;object-fit:contain;background:#fff}
.card .word{font-size:12px;margin:5px 0;font-weight:bold}
.btns{display:flex;gap:3px;margin-top:4px}
.btns button{flex:1;padding:4px;border:1px solid #ddd;background:#fff;cursor:pointer;border-radius:3px}
.btns button.ok.on{background:#4caf50;color:white}
.btns button.on{background:#f44336;color:white}
.lb{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
.lb.on{display:flex}
.lb img{max-width:90%;max-height:70%;border-radius:8px}
.lb .wd{color:white;font-size:24px;font-weight:bold;margin:15px 0}
.lb .cl{position:absolute;top:20px;right:30px;color:white;font-size:40px;cursor:pointer}
.lb .acts{display:flex;gap:15px;margin-top:20px}
.lb .acts button{padding:12px 30px;font-size:16px;border:none;border-radius:8px;cursor:pointer}
.lb .acts .pass{background:#4caf50;color:white}
.lb .acts .redo{background:#f44336;color:white}
</style>
</head>
<body>
<div class="container">
<h1>English-Game 图片审核 (需重做)</h1>
<div class="toolbar">
<div class="stats">
<div class="stat ok"><b id="ok">0</b>通过</div>
<div class="stat bad"><b id="bad">0</b>重做</div>
</div>
<button class="btn" onclick="showReport()">查看报告</button>
</div>
<div id="list"></div>
</div>
<div class="lb" id="lb" onclick="closeLb()">
<div class="cl">×</div>
<img id="lbImg">
<div class="wd" id="lbWd"></div>
<div class="acts">
<button class="pass" onclick="setSt('ok')">通过</button>
<button class="redo" onclick="setSt('bad')">重做</button>
</div>
</div>
<script>
const words = {
    2: ["sunday"],
    3: ["close"]
};
const filenameMap = {
    "sunday": "Sunday.png"
};
function getImg(g,w){
    let fname = filenameMap[w] || w + ".png";
    return "/images/grade"+g+"/"+fname;
}
let st = JSON.parse(localStorage.getItem('rev_st')||'{}');
function save(){localStorage.setItem('rev_st',JSON.stringify(st));render()}
function update(){
    let ok=0,bad=0;
    for(let g in words){
        words[g].forEach(w=>{
            let key = g+'-'+w;
            if(st[key]==='ok')ok++;
            if(st[key]==='bad')bad++;
        });
    }
    document.getElementById('ok').textContent=ok;
    document.getElementById('bad').textContent=bad;
}
function render(){
    let html = '';
    for(let g in words){
        html += '<div class="grade"><h2>年级'+g+'</h2><div class="grid">';
        words[g].forEach(w=>{
            let key = g+'-'+w;
            let s = st[key]||'';
            let cls = 'card'+(s==='ok'?' ok':s==='bad'?' bad':'');
            html += '<div class="'+cls+'" onclick="openLb('+g+',&#39;'+w+'&#39;)">'+
                '<img src="'+getImg(g,w)+'">'+
                '<div class="word">'+w+'</div>'+
                '<div class="btns"><button class="ok'+(s==='ok'?' on':'')+'" onclick="event.stopPropagation();st[\''+key+'\']=\'ok\';save()">通过</button>'+
                '<button class="'+(s==='bad'?' on':'')+'" onclick="event.stopPropagation();st[\''+key+'\']=\'bad\';save()">重做</button></div></div>';
        });
        html += '</div></div>';
    }
    document.getElementById('list').innerHTML = html;
    update();
}
function openLb(g,w){
    current = {g,w,key:g+'-'+w};
    document.getElementById('lbImg').src = getImg(g,w);
    document.getElementById('lbWd').textContent = w;
    document.getElementById('lb').classList.add('on');
}
function closeLb(){document.getElementById('lb').classList.remove('on')}
function setSt(s){if(current){st[current.key]=s;save();closeLb()}}
function showReport(){
    let ok=[],bad=[];
    for(let g in words){
        words[g].forEach(w=>{
            let key = g+'-'+w;
            if(st[key]==='ok')ok.push(w);
            if(st[key]==='bad')bad.push(w);
        });
    }
    alert('通过: '+(ok.length?ok.join(', '):'无')+'\n重做: '+(bad.length?bad.join(', '):'无'));
}
render();
</script>
</body>
</html>
