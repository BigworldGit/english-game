<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>图片审核</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
h1{text-align:center;color:#333}
.grade{margin:20px 0;background:white;padding:15px;border-radius:8px}
.grade h2{margin:0 0 15px 0;color:#666;border-bottom:1px solid #ddd;padding-bottom:10px}
.grid{display:flex;flex-wrap:wrap;gap:15px}
.card{border:2px solid #ddd;padding:10px;border-radius:8px;text-align:center;width:120px}
.card img{width:100px;height:100px;object-fit:contain;border:1px solid #eee}
.word{margin-top:5px;font-size:12px;font-weight:bold}
</style>
</head>
<body>
<h1>📋 图片审核</h1>

<div class="grade">
<h2>Grade 1 (11个单词)</h2>
<div class="grid">
<div class="card"><img src="../images/grade1/bye.png"><div class="word">bye</div></div>
<div class="card"><img src="../images/grade1/four.png"><div class="word">four</div></div>
<div class="card"><img src="../images/grade1/goodbye.png"><div class="word">goodbye</div></div>
<div class="card"><img src="../images/grade1/hello.png"><div class="word">hello</div></div>
<div class="card"><img src="../images/grade1/hi.png"><div class="word">hi</div></div>
<div class="card"><img src="../images/grade1/one.png"><div class="word">one</div></div>
<div class="card"><img src="../images/grade1/sorry.png"><div class="word">sorry</div></div>
<div class="card"><img src="../images/grade1/two.png"><div class="word">two</div></div>
<div class="card"><img src="../images/grade1/welcome.png"><div class="word">welcome</div></div>
<div class="card"><img src="../images/grade1/what.png"><div class="word">what</div></div>
<div class="card"><img src="../images/grade1/thank.png"><div class="word">thank</div></div>
</div>
</div>

<div class="grade">
<h2>Grade 2 (7个中文星期)</h2>
<div class="grid">
<div class="card"><img src="../images/grade2/monday.png"><div class="word">monday</div></div>
<div class="card"><img src="../images/grade2/tuesday.png"><div class="word">tuesday</div></div>
<div class="card"><img src="../images/grade2/wednesday.png"><div class="word">wednesday</div></div>
<div class="card"><img src="../images/grade2/thursday.png"><div class="word">thursday</div></div>
<div class="card"><img src="../images/grade2/friday.png"><div class="word">friday</div></div>
<div class="card"><img src="../images/grade2/saturday.png"><div class="word">saturday</div></div>
<div class="card"><img src="../images/grade2/sunday.png"><div class="word">sunday</div></div>
</div>
</div>

<div class="grade">
<h2>Grade 3 (11个单词)</h2>
<div class="grid">
<div class="card"><img src="../images/grade3/English.png"><div class="word">English</div></div>
<div class="card"><img src="../images/grade3/PE.png"><div class="word">PE</div></div>
<div class="card"><img src="../images/grade3/close.png"><div class="word">close</div></div>
<div class="card"><img src="../images/grade3/long.png"><div class="word">long</div></div>
<div class="card"><img src="../images/grade3/math.png"><div class="word">math</div></div>
<div class="card"><img src="../images/grade3/old.png"><div class="word">old</div></div>
<div class="card"><img src="../images/grade3/tall.png"><div class="word">tall</div></div>
<div class="card"><img src="../images/grade3/today.png"><div class="word">today</div></div>
<div class="card"><img src="../images/grade3/tomorrow.png"><div class="word">tomorrow</div></div>
<div class="card"><img src="../images/grade3/want.png"><div class="word">want</div></div>
<div class="card"><img src="../images/grade3/yesterday.png"><div class="word">yesterday</div></div>
</div>
</div>
</body>
</html>
